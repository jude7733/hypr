source = ~/.config/hypr/plugins/hyprbars.conf
source = ~/.config/hypr/plugins/hyprexpo.conf
source = ~/.config/hypr/plugins/hyprspace.conf
source = ~/.config/hypr/plugins/hyprwinwrap.conf
source = ~/.config/hypr/binds.conf
source = ~/.config/hypr/rules.conf
source = ~/.cache/wal/hyprland.conf

################
### MONITORS ###
################

monitor = , 1920x1200, auto, 1
# monitor = HDMI-A-1, 1920x1080, auto, 0.9
# monitor = HDMI-A-1, 1920x1200, 0x0, 1
#monitor = , preferred, auto, 1
#monitor = , preferred, auto, 1, mirror, HDMI-A-1


#################
### AUTOSTART ###
#################

exec-once = waybar &
exec-once = swaync & /usr/lib/polkit-kde-authentication-agent-1 &
exec-once = swww-daemon & waypaper --restore & hypridle &
exec-once = wl-paste --watch cliphist store & nm-applet --indicator &
exec-once = hyprctl setcursor Bibata-Modern-Ice 22 &
exec-once = hyprpm reload -n &
exec-once = sleep 2 && kdeconnect-indicator & hyprsunset &
exec-once = batsignal -b -w 25 -c 15 -d 10 -f 79 -p &
exec-once = dbus-update-activation-environment --systemd HYPRLAND_INSTANCE_SIGNATURE


#############################
### ENVIRONMENT VARIABLES ###
#############################

# XDG
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# QT
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
# env = QT_STYLE_OVERRIDE,kvantum
env = QT_QPA_PLATFORM_PLUGIN_PATH, /usr/lib/qt/plugins/platforms

env = HYPRSHOT_DIR, Pictures/Screenshots/
env = HYPRCURSOR_THEME, Bibata-Modern-Ice
env = HYPRCURSOR_SIZE, 22
env = XCURSOR_THEME, Bibata-Modern-Ice
env = XCURSOR_SIZE, 22
env = GTK_THEME, Materia-dark-compact

# Toolkit Backend Variables
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland,x11
env = CLUTTER_BACKEND,wayland

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 5

    border_size = 2

    col.active_border = $color10 $color9 $color11 45deg
    col.inactive_border = $color6

    resize_on_border = true

    allow_tearing = false

    layout = dwindle

    # Three finger horizontal swipe to change workspace
    gesture = 3, horizontal, workspace
}

dwindle {
    default_split_ratio = 1.1
    special_scale_factor = 0.95
  }

scrolling {
  column_width = 0.7
}

decoration {
    rounding = 10

    active_opacity = 0.96
    inactive_opacity = 0.8

    blur {
        enabled = true
        size = 4
        passes = 3
        new_optimizations = true
        vibrancy = 0.1696
        ignore_opacity = true
    }
}

animations {
    enabled = true
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 5, wind, slide
    animation = windowsIn, 1, 5, winIn, slide
    animation = windowsOut, 1, 4, winOut, slide
    animation = windowsMove, 1, 4, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner
    animation = fade, 1, 8, default
    animation = workspaces, 1, 4, wind
    bezier = myCurve, 0.05, 0.9, 0.1, 1.05
    bezier = myCurve2, 0.2, 0.0, 0.1, 1.0
    animation = hyprfocusIn, 1, 1.7, myCurve
    animation = hyprfocusOut, 1, 1.7, myCurve2
    animation = specialWorkspace, 1, 6, default, slidefadevert -50%
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

#master {
#    new_is_master = true
#}

misc {
    force_default_wallpaper = 1
    # animate_manual_resize = true
}

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1

        gesture_distance = 300 # how far is the "max" for the gesture
    }
hyprfocus {
    enabled = yes

    # Choose animations: flash, shrink or nothing
    keyboard_focus_animation = shrink
    mouse_focus_animation    = shrink

    # Optional: configure easing / bezier curves for animations
    bezier = bezIn, 0.5,0.0,1.0,0.5
    bezier = bezOut, 0.0,0.5,0.5,1.0

    # ==== flash animation settings ====
    flash {
        flash_opacity = 0.7

        in_bezier  = bezIn
        in_speed   = 0.5

        out_bezier = bezOut
        out_speed  = 3
    }

    # ==== shrink animation settings ====
    shrink {
        shrink_percentage = 0.8

        in_bezier  = bezIn
        in_speed   = 0.5

        out_bezier = bezOut
        out_speed  = 3
    }
}
dynamic-cursors {

    # enables the plugin
    enabled = true

    # sets the cursor behaviour, supports these values:
    # tilt    - tilt the cursor based on x-velocity
    # rotate  - rotate the cursor based on movement direction
    # stretch - stretch the cursor shape based on direction and velocity
    # none    - do not change the cursors behaviour
    mode = stretch

    # minimum angle difference in degrees after which the shape is changed
    # smaller values are smoother, but more expensive for hw cursors
    threshold = 2

    # for mode = rotate
    rotate {

        # length in px of the simulated stick used to rotate the cursor
        # most realistic if this is your actual cursor size
        length = 20

        # clockwise offset applied to the angle in degrees
        # this will apply to ALL shapes
        offset = 0.0
    }

    # for mode = tilt
    tilt {

        # controls how powerful the tilt is, the lower, the more power
        # this value controls at which speed (px/s) the full tilt is reached
        # the full tilt being 60° in both directions
        limit = 5000

        # relationship between speed and tilt, supports these values:
        # linear             - a linear function is used
        # quadratic          - a quadratic function is used (most realistic to actual air drag)
        # negative_quadratic - negative version of the quadratic one, feels more aggressive
        # see `activation` in `src/mode/utils.cpp` for how exactly the calculation is done
        function = negative_quadratic

        # time window (ms) over which the speed is calculated
        # higher values will make slow motions smoother but more delayed
        window = 100
    }

    # for mode = stretch
    stretch {

        # controls how much the cursor is stretched
        # this value controls at which speed (px/s) the full stretch is reached
        # the full stretch being twice the original length
        limit = 3000

        # relationship between speed and stretch amount, supports these values:
        # linear             - a linear function is used
        # quadratic          - a quadratic function is used
        # negative_quadratic - negative version of the quadratic one, feels more aggressive
        # see `activation` in `src/mode/utils.cpp` for how exactly the calculation is done
        function = quadratic

        # time window (ms) over which the speed is calculated
        # higher values will make slow motions smoother but more delayed
        window = 100
    }

    # configure shake to find
    # magnifies the cursor if its is being shaken
    shake {

        # enables shake to find
        enabled = true

        # use nearest-neighbour (pixelated) scaling when shaking
        # may look weird when effects are enabled
        nearest = true

        # controls how soon a shake is detected
        # lower values mean sooner
        threshold = 6.0

        # magnification level immediately after shake start
        base = 4.0
        # magnification increase per second when continuing to shake
        speed = 4.0
        # how much the speed is influenced by the current shake intensitiy
        influence = 0.0

        # maximal magnification the cursor can reach
        # values below 1 disable the limit (e.g. 0)
        limit = 0.0

        # time in millseconds the cursor will stay magnified after a shake has ended
        timeout = 2000

        # show cursor behaviour `tilt`, `rotate`, etc. while shaking
        effects = false

        # enable ipc events for shake
        # see the `ipc` section below
        ipc = false
    }

    # use hyprcursor to get a higher resolution texture when the cursor is magnified
    # see the `hyprcursor` section below
    hyprcursor {

        # use nearest-neighbour (pixelated) scaling when magnifing beyond texture size
        # this will also have effect without hyprcursor support being enabled
        # 0 / false - never use pixelated scaling
        # 1 / true  - use pixelated when no highres image
        # 2         - always use pixleated scaling
        nearest = true

        # enable dedicated hyprcursor support
        enabled = true

        # resolution in pixels to load the magnified shapes at
        # be warned that loading a very high-resolution image will take a long time and might impact memory consumption
        # -1 means we use [normal cursor size] * [shake:base option]
        resolution = -1

        # shape to use when clientside cursors are being magnified
        # see the shape-name property of shape rules for possible names
        # specifying clientside will use the actual shape, but will be pixelated
        fallback = clientside
    }
}
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = caps:escape_shifted_capslock
    kb_rules =

    follow_mouse = 1

    sensitivity = 0.8

    touchpad {
        natural_scroll = true
    }
}

device {
    name = elan06c8:00-04f3:320b-touchpad
    sensitivity = +0.4
    }
device {
    name = tpps/2-elan-trackpoint
    sensitivity = -0.3
}


exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
