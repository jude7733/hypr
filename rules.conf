##############################
### WINDOWS AND WORKSPACES ###
##############################

# hyprctl clients - command to list all windows

source = ~/.cache/wal/hyprland.conf

# Suppress maximize event for all windows
windowrule {
  name = suppress-maximize
  match:class = .*
  suppress_event = maximize
}

# Set bordercolor to purple if window is fullscreen
windowrule {
  name = fullscreen-bordercolor
  match:fullscreen = 1
  border_color = $color13 $color14 45deg
}

# Opacity rules - kitty
windowrule {
  name = kitty-opacity
  match:class = ^(kitty)$
  opacity = 1.0 override 1.0 override
}

# Opacity rules - zen browser
windowrule {
  name = zen-opacity
  match:class = ^(zen)$
  opacity = 1 override 1 override 1
}

# Opacity rules - Firefox
windowrule {
  name = firefox-opacity
  match:title = ^(Mozilla Firefox)$
  opacity = 0.9
}

# Opacity rules - fullscreen windows
windowrule {
  name = fullscreen-opacity
  match:fullscreen = 1
  opacity = 1.0 override 1.0 override
}

# Opacity rules - Thunar file manager
windowrule {
  name = thunar-opacity
  match:class = ^(thunar)$
  opacity = 0.8
}

# Opacity rules - Telegram
windowrule {
  name = telegram-opacity
  match:title = Telegram
  opacity = 0.95
}

# Opacity rules - Discord
windowrule {
  name = discord-opacity
  match:class = ^(discord)
  opacity = 0.96
}

# Layer rule for logout dialog blur
layerrule {
  name = logout-blur
  match:namespace = logout_dialog
  blur = on
}

# ========== Float Rules ==========

# Float wofi (launcher)
windowrule {
  name = float-wofi
  match:class = wofi
  float = on
}

# Float waypaper (wallpaper selector)
windowrule {
  name = float-waypaper
  match:class = waypaper
  float = on
}

# Float calculator
windowrule {
  name = float-galculator
  match:class = org.gnome.Calculator
  float = on
}

# Float PulseAudio volume control
windowrule {
  name = float-pavucontrol
  match:class = (org.pulseaudio.pavucontrol|pavucontrol)
  float = on
}

# Float file operation progress
windowrule {
  name = float-file-progress
  match:class = ^()$
  match:title = ^(File Operation Progress)$
  float = on
}

# Float picture in picture
windowrule {
  name = float-pip
  match:class = ^()$
  match:title = ^(Picture in picture)$
  float = on
}

# Float Brave save/open dialogs
windowrule {
  name = float-brave-save
  match:class = ^(brave)$
  match:title = ^(Save File)$
  float = on
}

windowrule {
  name = float-brave-open
  match:class = ^(brave)$
  match:title = ^(Open File)$
  float = on
}

# Float LibreWolf picture-in-picture
windowrule {
  name = float-librewolf-pip
  match:class = ^(LibreWolf)$
  match:title = ^(Picture-in-Picture)$
  float = on
}

# Float Blueman manager
windowrule {
  name = float-blueman
  match:class = ^(blueman-manager)$
  float = on
}

# Float XDG portal
windowrule {
  name = float-xdg-portal
  match:class = ^(xdg-desktop-portal-hyprland)$
  float = on
}

# Float Polkit authentication agent
windowrule {
  name = float-polkit
  match:class = ^(org.kde.polkit-kde-authentication-agent-1)$
  float = on
}

# Float zenity dialogs
windowrule {
  name = float-zenity
  match:class = ^(zenity)$
  float = on
}

# Float Steam updater
windowrule {
  name = float-steam-updater
  match:class = ^()$
  match:title = ^(Steam - Self Updater)$
  float = on
}

# Float Safeeyes
windowrule {
  name = float-safeeyes
  match:class = ^(Safeeyes)$
  float = on
}

# ========== Sized/Positioned Float Rules ==========

# Picture in picture sizing and positioning
windowrule {
  name = pip-size-position
  match:title = ^(Picture-in-Picture)$
  size = 960 540
  move = 25%- 0
  float = on
}


# Send btop to workspace 4
windowrule {
  name = btop-workspace
  match:title = ^(btop)$
  workspace = 4
}


# ========== Workspace Rules ==========
workspace = 2, defaultName:coding
workspace = 2, rounding:false, decorate:false, gapsin:2, gapsout:0, border:false
workspace = 8,bordersize:8
workspace = 5, on-created-empty:[float] firefox
workspace = special:scratchpad, on-created-empty:foot

# -- Layout rules --
workspace = 1, layout:scrolling
workspace = 2, layout:monocle
workspace = 4, layout:master
